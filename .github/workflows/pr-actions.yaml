name: PR Security & Plan Scan
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]

concurrency:
  [cite_start]group: tf-state-lock-main # Matches Deploy group to prevent S3 lock collisions
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: us-east-1

      # Removed the redundant first 'Run Terraform Logic' call
      - name: Run Terraform Scan
        uses: ./.github/actions/detect_terraform_changes
        with:
          [cite_start]path: 'aws/payer' # Correctly targets the subdirectory