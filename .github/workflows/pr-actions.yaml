name: PR Security & Plan Scan
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ main ]

concurrency:
  group: tf-lock-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true # Safe to cancel an old PR scan if a new commit comes in

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: us-east-1

      - name: Run Terraform Logic
        uses: ./.github/actions/detect_terraform_changes