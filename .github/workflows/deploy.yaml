name: AWS Terraform Deploy
on:
  push:
    branches: [ main ]

concurrency:
  group: tf-state-lock-main  # Correct: matches the PR group
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: us-east-1

      # 1. RUN PLAN FIRST (Using your composite action with the correct path)
      - name: Run Terraform Plan
        uses: ./.github/actions/detect_terraform_changes
        with:
          path: 'aws/payer'

      # 2. RUN APPLY (Must specify working-directory to find the initialized state)
      - name: Terraform Apply
        working-directory: aws/payer
        run: terraform apply -auto-approve -input=false