name: AWS Terraform Deploy
on:
  push:
    branches: [ main ]

concurrency:
  group: tf-state-lock-main  # Must match the PR group exactly
  cancel-in-progress: false # NEVER cancel a deploy mid-way; let it finish!

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: us-east-1

      - name: Run Terraform Plan (Reuse Action)
        uses: ./.github/actions/detect_terraform_changes

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false