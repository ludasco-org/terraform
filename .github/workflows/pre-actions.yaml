---
name: PR actions
on:
  pull_request:

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  REGION: us-east-1

jobs:
  detect_changes:
    name: Detect changed stacks
    runs-on: ubuntu-latest-4-cores
    outputs:
      stacks: ${{ steps.detect.outputs.changed_stacks }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: jenseng/dynamic-uses@8bc24f0360175e710da532c4d19eafdbed489a06 # v1.1.1
        with:
          uses: ${{ github.repository_owner }}/githubactions/actions/checkout@main
          with: |
            fetch-depth: 0
      - name: Detect changed stacks
        id: detect
        uses: ./.github/actions/detect_terraform_changes
        with:
          base_ref: ${{ github.base_ref }}

  terraform_plan:
    name: Terraform plan
    runs-on: ubuntu-latest-4-cores
    needs: detect_changes
    if: needs.detect_changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect_changes.outputs.stacks) }}
    env:
      EXPAND_SUMMARY_DETAILS: "false"
      TF_IN_AUTOMATION: true
      TF_VERSION: 1.13.5
    steps:
      - name: Checkout
        uses: jenseng/dynamic-uses@8bc24f0360175e710da532c4d19eafdbed489a06 # v1.1.1
        with:
          uses: ${{ github.repository_owner }}/githubactions/actions/checkout@main
          with: |
            ref: ${{ github.head_ref }}
      - name: Compute environment
        id: compute_environment
        shell: bash
        run: |
          OWNER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          if [ "${OWNER}" == "lance" ]; then
            ENVIRONMENT="production"
          else
            ENVIRONMENT="staging"
          fi
          echo "ENVIRONMENT=${ENVIRONMENT}" >> $GITHUB_OUTPUT
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      - name: Get Stack Name
        id: stack_name
        shell: bash
        run: |
          STACK_NAME=$(basename "${{ matrix.stack }}")
          echo "STACK_NAME=${STACK_NAME}" >> $GITHUB_ENV
      - name: Get IAM Role ARN
        id: iam_role_arn
        uses: jenseng/dynamic-uses@8bc24f0360175e710da532c4d19eafdbed489a06 # v1.1.1
        with:
          uses: ${{ github.repository_owner }}/githubactions/actions/organization_variables@main
          with: |
            path: ${{ format('{0}."{1}".iam_role', steps.compute_environment.outputs.ENVIRONMENT, env.STACK_NAME) }}
      - name: Obtain AWS nws-tools Credentials
        uses: jenseng/dynamic-uses@8bc24f0360175e710da532c4d19eafdbed489a06 # v1.1.1
        with:
          uses: ${{ github.repository_owner }}/githubactions/actions/configure_aws_profile@main
          with: |
            role: ${{ fromJSON(steps.iam_role_arn.outputs.outputs).result }}
            region: ${{ env.REGION }}
            duration: 3600
      - name: Terraform init
        id: init
        uses: jenseng/dynamic-uses@8bc24f0360175e710da532c4d19eafdbed489a06 # v1.1.1
        with:
          uses: ${{ github.repository_owner }}/githubactions/actions/terraform_init@main
          with: |
            working_directory: ${{ matrix.stack }}
            terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform format check
        id: fmt
        shell: bash
        working-directory: ${{ matrix.stack }}
        run: |
          terraform fmt -check -recursive
      - name: Terraform validate
        id: validate
        shell: bash
        working-directory: ${{ matrix.stack }}
        run: |
          terraform validate
      - name: Terraform plan
        id: plan
        if: ${{ inputs.skip_plan != 'true' }}
        uses: jenseng/dynamic-uses@8bc24f0360175e710da532c4d19eafdbed489a06 # v1.1.1
        with:
          uses: ${{ github.repository_owner }}/githubactions/actions/terraform_plan@main
          with: |
            working_directory: ${{ matrix.stack }}
            extra_terraform_args: -lock=false
      - name: Post Plan
        uses: GetTerminus/terraform-pr-commenter@93a60116ff139d4e9b92b2b61ddc15ebfbdb89c6 # v3
        if: always() && github.ref != 'refs/heads/main' && (steps.plan.outcome == 'success' || steps.plan.outcome == 'failure')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TF_WORKSPACE: ${{ env.STACK_NAME }}
        with:
          commenter_type: plan
          commenter_plan_path: ${{ matrix.stack }}/${{ fromJSON(steps.plan.outputs.outputs).output_file_path }}
          commenter_exitcode: ${{ fromJSON(steps.plan.outputs.outputs).exitCode }}
          terraform_version: ${{ env.TF_VERSION }}

  terraform_plan_status:
    runs-on: ubuntu-latest-4-cores
    needs: terraform_plan
    if: always()
    steps:
      - name: Successful workflow
        if: ${{ !(contains(needs.*.result, 'failure')) && !(contains(needs.*.result, 'canceled')) }}
        run: exit 0
      - name: Failing workflow
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'canceled') }}
        run: exit 1
